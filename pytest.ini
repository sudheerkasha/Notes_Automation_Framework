# pytest.ini - Configuration file for pytest

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# markers for categorizing tests
markers =
    smoke: Smoke tests - critical path validation
    regression: Full regression test suite
    ui: UI-based tests using Selenium
    api: API-based tests using requests library
    e2e: End-to-end hybrid tests (UI + API)
    negative: Negative/boundary test cases
    performance: Performance validation tests
    flaky: Known flaky tests with retry logic
    delete: Tests related to note deletion functionality

# --- Test Execution ---
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=reports/allure-results

# --- Logging Configuration ---
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# timeout settings to prevent hanging tests
timeout = 60
timeout_method = thread
